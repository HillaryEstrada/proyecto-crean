<!-- ============================================
     VISTA: vehiculo.html
     Descripción: Interfaz para gestionar vehiculo
     ============================================ -->

<div class="alert alert-primary mt-4 container text-center">
    <h2>Gestión de Vehiculo</h2>
</div>

<!-- Botones de acción -->
<div class="container mb-3 text-end">
    <button class="btn btn-success" onclick="mostrarFormulario()">Crear Vehiculo</button>
    <button class="btn btn-secondary d-none" id="btnCancelar" onclick="mostrarTabla()">Cancelar</button>
</div>

<!-- FORMULARIO para crear/editar vehiculo -->
<div class="container d-none" id="contenedorFormulario">
    <form id="formVehiculo">
        <!-- Campo oculto para el ID al editar -->
        <input type="hidden" id="pk_vehiculo">

        <div class="mb-3">
            <label class="form-label">Número Económico</label>
            <input type="text" id="numero_economico" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Tipo de Vehiculo</label>
            <input type="text" id="tipo_vehiculo" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Marca</label>
            <input type="text" id="marca" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Modelo</label>
            <input type="text" id="modelo" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Año</label>
            <input type="number" id="anio" class="form-control">
        </div>

        <div class="mb-3">
            <label class="form-label">Ubicación</label>
            <input type="text" id="ubicacion" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Guardar Vehiculo</button>
    </form>
</div>

<!-- TABLA para listar vehiculo -->
<div class="container mt-4" id="contenedorTabla">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>N° Económico</th>
                <th>Tipo</th>
                <th>Marca</th>
                <th>Modelo</th>
                <th>Ubicación</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaVehiculo"></tbody>
    </table>
    <!-- Contenedor para la paginación -->
    <div id="footer-paginacion"></div>
</div>
