<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Checklist</title>
</head>
<body>

<div class="container-fluid py-4">

    <!-- Encabezado -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-1 fw-semibold">Checklist diario</h4>
            <p class="text-muted mb-0" style="font-size:13px;">
                Registro de inspecciones diarias de maquinaria y vehículos
            </p>
        </div>

        <button class="btn btn-success btn-sm px-3" data-bs-toggle="modal" data-bs-target="#modalChecklist">
            <i class="fas fa-plus me-1"></i> Registrar checklist
        </button>
    </div>

    <!-- Filtros -->
    <div class="card border-0 shadow-sm mb-4">
        <div class="card-body py-3 d-flex flex-wrap gap-2 align-items-center">

            <input type="text" id="busqueda" class="form-control form-control-sm"
                placeholder="Buscar equipo..." style="max-width:200px;">

            <select id="filtro-tipo" class="form-select form-select-sm" style="max-width:160px;">
                <option value="">Todos</option>
                <option value="maquinaria">Maquinaria</option>
                <option value="vehiculo">Vehículo</option>
            </select>

            <input type="date" id="filtro-fecha" class="form-control form-control-sm" style="max-width:160px;">

        </div>
    </div>

    <!-- Tabla -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white border-bottom py-3 d-flex justify-content-between align-items-center">
            <span class="fw-semibold" style="font-size:14px;">Registros de checklist</span>
            <span class="text-muted" style="font-size:12px;" id="total-registros">
                0 registros
            </span>
        </div>

        <div class="card-body p-0">

            <!-- Estado vacío -->
            <div id="estado-vacio" class="text-center py-5 text-muted">
                <i class="fas fa-clipboard-list fa-2x mb-3 d-block"></i>
                No hay registros de checklist
            </div>

            <!-- Tabla -->
            <div class="table-responsive" id="tabla-container" style="display:none;">
                <table class="table table-hover mb-0 align-middle">

                    <thead class="table-light">
                        <tr style="font-size:12px;">
                            <th>#</th>
                            <th>Equipo</th>
                            <th>Tipo</th>
                            <th>Fecha</th>
                            <th>Resultado</th>
                            <th>Observaciones</th>
                            <th>Usuario</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="tabla-checklist">
                        <!-- JS llena aquí -->
                    </tbody>

                </table>
            </div>

        </div>

        <!-- Footer -->
        <div class="card-footer bg-white border-top py-2 d-flex justify-content-between align-items-center">
            <span style="font-size:12px;color:#6c757d;">
                Mostrando registros
            </span>

            <div class="d-flex gap-1">
                <button class="btn btn-sm btn-outline-secondary">‹</button>
                <button class="btn btn-sm btn-primary">1</button>
                <button class="btn btn-sm btn-outline-secondary">›</button>
            </div>
        </div>
    </div>

</div>

<!-- MODAL CHECKLIST -->
<div class="modal fade" id="modalChecklist" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">

            <div class="modal-header bg-success text-white">
                <h6 class="modal-title">Registrar checklist</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <!-- Tipo -->
                <div class="mb-3">
                    <label class="form-label">Tipo de activo</label>
                    <select id="tipo_activo" class="form-select">
                        <option value="maquinaria">Maquinaria</option>
                        <option value="vehiculo">Vehículo</option>
                    </select>
                </div>

                <!-- Equipo -->
                <div class="mb-3">
                    <label class="form-label">Seleccionar equipo</label>
                    <select id="equipo" class="form-select">
                        <!-- JS -->
                    </select>
                </div>

                <!-- Checklist -->
                <div class="mb-3">
                    <label class="form-label">Revisión</label>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="nivel_aceite">
                        <label class="form-check-label">Nivel de aceite</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="nivel_refrigerante">
                        <label class="form-check-label">Nivel de refrigerante</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="filtro_aire">
                        <label class="form-check-label">Filtro de aire</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="presion_llantas">
                        <label class="form-check-label">Presión de llantas</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="nivel_combustible">
                        <label class="form-check-label">Nivel de combustible</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="engrase_puntos">
                        <label class="form-check-label">Engrase de puntos</label>
                    </div>

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="inspeccion_visual">
                        <label class="form-check-label">Inspección visual</label>
                    </div>

                </div>

                <!-- Observaciones -->
                <div class="mb-3">
                    <label class="form-label">Observaciones</label>
                    <textarea id="observaciones" class="form-control" rows="2"></textarea>
                </div>

            </div>

            <div class="modal-footer">
                <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">
                    Cancelar
                </button>
                <button class="btn btn-success btn-sm" onclick="guardarChecklist()">
                    <i class="fas fa-save me-1"></i> Guardar
                </button>
            </div>

        </div>
    </div>
</div>

<script src="/js/modules/checklist/checklist.js?v=${Date.now()}"></script>

</body>
</html>
