<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema CREAN</title>

    <!-- Bootstrap LOCAL -->
    <link rel="stylesheet" href="/libs/bootstrap/css/bootstrap.min.css">

    <!-- Bootstrap Icons LOCAL -->
    <link rel="stylesheet" href="/libs/bootstrap-icons/font/bootstrap-icons.min.css">

    <!-- CSS global del sistema -->
    <link rel="stylesheet" href="/css/global.css">
</head>
<body>

<div class="crean-layout">

    <!-- ══ SIDEBAR ══════════════════════════════════════════ -->
    <aside id="sidebar">

        <!-- Brand -->
        <div class="sidebar-brand">
            <div class="brand-icon" id="btnCollapse" title="Colapsar/Expandir menú" style="cursor:pointer;">
                <i class="bi bi-cpu" id="brandIcon"></i>
            </div>
            <span class="brand-text">Sistema CREAN</span>
        </div>

        <!-- Navegación dinámica (menu.js la llena) -->
        <nav class="sidebar-nav" id="sidebar-nav"></nav>

        <!-- Footer usuario -->
        <div class="sidebar-footer">
            <div class="sidebar-avatar" id="userInitials">U</div>
            <div class="sidebar-user-info">
                <div class="user-name" id="displayUsername">Usuario</div>
                <div class="user-role" id="displayRole">Rol</div>
            </div>
            <button class="btn-logout" onclick="cerrarSesion()" title="Cerrar sesión">
                <i class="bi bi-box-arrow-right" style="font-size:1.1rem;"></i>
            </button>
        </div>
    </aside>

    <!-- ══ MAIN ═════════════════════════════════════════════ -->
    <div class="crean-main" id="creanMain">

        <!-- Topbar -->
        <header class="crean-topbar">
            <!-- Botón hamburguesa móvil -->
            <button class="btn-notif d-md-none" id="btnMobileMenu">
                <i class="bi bi-list"></i>
            </button>

            <span class="topbar-breadcrumb">
                <span id="topbarSection">Inicio</span>
            </span>

            <div class="topbar-right">
                <!-- Notificaciones -->
                <button class="btn-notif" id="btnNotificaciones" title="Notificaciones">
                    <i class="bi bi-bell"></i>
                    <span class="notif-badge" id="notifCount" style="display:none;">0</span>
                </button>

                <!-- Estado en línea -->
                <div class="topbar-status">
                    <span class="dot"></span>
                    En línea
                </div>
            </div>
        </header>

        <!-- Contenido dinámico -->
        <div class="crean-content" id="contenido">
            <div class="crean-card p-5 text-center" style="max-width:480px;margin:40px auto;">
                <i class="bi bi-grid-3x3-gap-fill"
                   style="font-size:3rem;color:var(--crean-secondary);"></i>
                <h4 class="mt-3 fw-bold" style="color:var(--crean-primary);">
                    Bienvenido al Sistema CREAN
                </h4>
                <p class="text-muted mt-2 mb-0">
                    Selecciona una opción del menú lateral para comenzar.
                </p>
            </div>
        </div>
    </div>
</div>

<!-- ══ TOAST CONTAINER (global) ══════════════════════════════ -->
<div class="crean-toast-container" id="toastContainer"></div>

<!-- ══ MODAL CONFIRMACIÓN GLOBAL ═════════════════════════════ -->
<div class="modal fade" id="modalConfirm" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered" style="max-width:420px;">
        <div class="modal-content border-0"
             style="border-radius:12px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.2);">
            <div class="crean-modal-header">
                <h5 class="modal-title" id="confirmTitle">
                    <i class="bi bi-question-circle"></i> Confirmar acción
                </h5>
            </div>
            <div class="modal-body p-4">
                <p id="confirmText" class="mb-0"
                   style="font-size:0.9rem;color:var(--crean-text);"></p>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-sm btn-outline-secondary"
                        data-bs-dismiss="modal">
                    <i class="bi bi-x-lg me-1"></i>Cancelar
                </button>
                <button type="button" class="btn btn-sm btn-danger" id="confirmBtn">
                    <i class="bi bi-check-lg me-1"></i>Confirmar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ══ SCRIPTS ═══════════════════════════════════════════════ -->
<!-- Bootstrap JS LOCAL -->
<script src="/libs/bootstrap/js/bootstrap.bundle.min.js"></script>

<!-- Core del sistema -->
<script src="/js/core/auth.js"></script>
<script src="/js/core/ui.js"></script>
<script src="/js/core/menu.js"></script>
<script src="/js/components/paginacion.js"></script>
<script src="/js/components/forms.js"></script>

<script>
    // ── Sidebar collapse ──────────────────────────────────
    const sidebar     = document.getElementById('sidebar');
    const creanMain   = document.getElementById('creanMain');
    const btnCollapse = document.getElementById('btnCollapse');
    const brandIcon   = document.getElementById('brandIcon');

    function setSidebarState(collapsed) {
        if (collapsed) {
            sidebar.classList.add('collapsed');
            creanMain.classList.add('expanded');
            brandIcon.className = 'bi bi-layout-sidebar';
        } else {
            sidebar.classList.remove('collapsed');
            creanMain.classList.remove('expanded');
            brandIcon.className = 'bi bi-cpu';
        }
        localStorage.setItem('sidebar_collapsed', String(collapsed));
    }

    btnCollapse.addEventListener('click', () => {
        setSidebarState(!sidebar.classList.contains('collapsed'));
    });

    if (localStorage.getItem('sidebar_collapsed') === 'true') {
        setSidebarState(true);
    }

    // ── Menú móvil ────────────────────────────────────────
    document.getElementById('btnMobileMenu').addEventListener('click', () => {
        sidebar.classList.toggle('mobile-open');
    });

    // ── Info del usuario en footer ────────────────────────
    (function() {
        const user = getCurrentUser();
        if (!user) {
            window.top.location.href = '/views/auth/login.html';
            return;
        }
        document.getElementById('displayUsername').textContent = user.username || 'Usuario';
        document.getElementById('displayRole').textContent     = user.rol      || '';
        document.getElementById('userInitials').textContent    =
            (user.username || 'U').substring(0, 2).toUpperCase();
    })();

    // ── Cerrar sesión ─────────────────────────────────────
    function cerrarSesion() {
        creanConfirm({
            title:   'Cerrar sesión',
            text:    '¿Estás seguro que deseas cerrar la sesión?',
            variant: 'danger',
            label:   'Sí, salir',
            onConfirm: () => logout()
        });
    }
</script>

</body>
</html>
