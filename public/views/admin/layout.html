<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Monolítico JS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/layout.css">
</head>
<body>

    <!-- ═══ SIDEBAR ═══════════════════════════════════════ -->
    <aside id="sidebar">

        <div class="sidebar-header">
            <div class="brand">
                <span class="brand-name">CREAN</span>
            </div>
            <button class="collapse-btn" id="collapse-btn" title="Colapsar menú">
                <i class="fas fa-angles-left"></i>
            </button>
        </div>

        <nav id="sidebar-nav"></nav>

        <div class="sidebar-footer">
            <div class="user-card">
                <div class="avatar" id="userInitials">U</div>
                <div class="user-info">
                    <div class="user-name" id="displayUsername">Usuario</div>
                    <div class="user-role" id="displayRole">Rol</div>
                </div>
                <button class="logout-btn" onclick="cerrarSesion()" title="Cerrar sesión">
                    <i class="fas fa-arrow-right-from-bracket" style="font-size:14px;"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- ═══ MAIN ══════════════════════════════════════════ -->
    <div id="main">
        <div id="contenido">
            <div class="welcome-card">
                <h2>Bienvenido al Sistema</h2>
                <p>Selecciona una opción del menú para comenzar.</p>
            </div>
        </div>
    </div>

    <!-- ═══ SCRIPTS ═══════════════════════════════════════ -->
    <script src="/js/core/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // ─── Sidebar collapse ──────────────────────────────
        const sidebar     = document.getElementById('sidebar');
        const collapseBtn = document.getElementById('collapse-btn');

        collapseBtn.addEventListener('click', () => {
            sidebar.classList.toggle('collapsed');
            localStorage.setItem('sidebarCollapsed', sidebar.classList.contains('collapsed'));
        });

        if (localStorage.getItem('sidebarCollapsed') === 'true') {
            sidebar.classList.add('collapsed');
        }

        // ─── Usuario ───────────────────────────────────────
        (function () {
            const user = (typeof getCurrentUser === 'function') ? getCurrentUser() : null;
            if (!user) {
                window.top.location.href = '/views/auth/login.html';
                return;
            }
            document.getElementById('displayUsername').textContent = user.username;
            document.getElementById('displayRole').textContent     = user.rol;
            document.getElementById('userInitials').textContent    = user.username.substring(0, 2).toUpperCase();
        })();

        // ─── Cerrar sesión ─────────────────────────────────
        function cerrarSesion() {
            Swal.fire({
                title: '¿Cerrar sesión?',
                text: '¿Estás seguro que deseas salir?',
                icon: 'question',
                showCancelButton: true,
                confirmButtonColor: '#2e86c1',
                cancelButtonColor: '#6b7c93',
                confirmButtonText: 'Sí, salir',
                cancelButtonText: 'Cancelar'
            }).then(r => { if (r.isConfirmed && typeof logout === 'function') logout(); });
        }
    </script>

    <script src="/js/core/menu.js"></script>
    <script src="/js/components/paginacion.js"></script>
    <script src="/js/components/forms.js"></script>

</body>
</html>
