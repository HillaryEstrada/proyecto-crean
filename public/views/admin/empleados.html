<!-- ============================================
     VISTA: empleados.html
     Descripción: Gestión de empleados – diseño CREAN
     Compatible con: empleados.js
     Nota: Partial view inyectada por cargarVista() en menu.js
     ============================================ -->

<!-- ── CABECERA ── -->
<div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">
    <div>
        <h4 class="fw-bold mb-1" style="color:#1a3c5e;">
            <i class="fa-solid fa-users me-2"></i>Empleados
        </h4>
        <p class="text-muted small mb-0">Gestión del personal del sistema</p>
    </div>
    <button class="btn text-white fw-semibold" style="background:#1a3c5e;" onclick="mostrarFormulario()">
        <i class="fa-solid fa-plus me-1"></i>Registrar empleado
    </button>
</div>

<!-- ── FORMULARIO (oculto por defecto) ── -->
<div class="d-none mb-4" id="contenedorFormulario">
    <div class="card border-0 shadow-sm" style="border-radius:12px; overflow:hidden;">
        <div class="card-header fw-semibold text-white py-3 px-4" style="background:#1a3c5e;">
            <i class="fa-solid fa-user-plus me-2"></i>
            <span id="tituloFormulario">Registrar Empleado</span>
        </div>
        <div class="card-body p-4">
            <form id="formEmpleado">
                <input type="hidden" id="pk_empleado">

                <div class="row g-3">

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Número de empleado <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="numero_empleado" class="form-control"
                            placeholder="Ej: EMP-010" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Nombre <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="nombre" class="form-control"
                            placeholder="Ej: Juan" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Apellido paterno <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="apellido_paterno" class="form-control"
                            placeholder="Ej: García" required>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Apellido materno
                        </label>
                        <input type="text" id="apellido_materno" class="form-control"
                            placeholder="Ej: López">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Sexo
                        </label>
                        <select id="sexo" class="form-select">
                            <option value="">Seleccionar…</option>
                            <option value="masculino">Masculino</option>
                            <option value="femenino">Femenino</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Estado
                        </label>
                        <select id="estado" class="form-select">
                            <option value="activo">Activo</option>
                            <option value="inactivo">Inactivo</option>
                        </select>
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Teléfono
                        </label>
                        <input type="text" id="telefono" class="form-control"
                            placeholder="Ej: 3111234567">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Correo
                        </label>
                        <input type="email" id="correo" class="form-control"
                            placeholder="Ej: juan@crean.gob.mx">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Fecha de ingreso
                        </label>
                        <input type="date" id="fecha_ingreso" class="form-control">
                    </div>

                    <div class="col-12">
                        <label class="form-label fw-semibold" style="font-size:12px; color:#1a3c5e;">
                            Dirección
                        </label>
                        <input type="text" id="direccion" class="form-control"
                            placeholder="Ej: Tepic, Nayarit">
                    </div>

                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <button type="button" class="btn btn-secondary px-4" onclick="mostrarTabla()">
                        <i class="fa-solid fa-xmark me-1"></i>Cancelar
                    </button>
                    <button type="submit" class="btn btn-success px-4">
                        <i class="fa-solid fa-floppy-disk me-1"></i>Guardar
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<!-- ── CONTENEDOR TABLA ── -->
<div id="contenedorTabla">

    <!-- TABS -->
    <ul class="nav nav-tabs mb-3">
        <li class="nav-item">
            <button class="nav-link active d-flex align-items-center gap-2"
                id="tabActivos" onclick="switchTab('activos')">
                <i class="fa-solid fa-user-check"></i>
                Activos
                <span class="badge rounded-pill" style="background:#1a3c5e;" id="badgeActivos">0</span>
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link d-flex align-items-center gap-2"
                id="tabBajas" onclick="switchTab('bajas')">
                <i class="fa-solid fa-user-slash"></i>
                Bajas
                <span class="badge bg-secondary rounded-pill" id="badgeBajas">0</span>
            </button>
        </li>
    </ul>

    <!-- VISTA ACTIVOS -->
    <div id="vistaActivos">
        <div class="d-flex gap-2 mb-3 flex-wrap">
            <div class="flex-grow-1 position-relative" style="min-width:200px;">
                <i class="fa-solid fa-magnifying-glass text-muted"
                    style="position:absolute; left:10px; top:50%; transform:translateY(-50%);
                           font-size:12px; pointer-events:none;"></i>
                <input type="text" class="form-control ps-4" id="searchInput"
                    placeholder="Buscar por nombre, número, correo…" oninput="filtrarTabla()">
            </div>
        </div>

        <div class="card border-0 shadow-sm" style="border-radius:12px; overflow:hidden;">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead style="background:#1a3c5e;">
                        <tr class="text-white" style="font-size:11.5px; font-weight:600; letter-spacing:.3px;">
                            <th class="py-3 px-3">#</th>
                            <th class="py-3 px-3">N° EMP</th>
                            <th class="py-3 px-3">NOMBRE COMPLETO</th>
                            <th class="py-3 px-3">SEXO</th>
                            <th class="py-3 px-3">TELÉFONO</th>
                            <th class="py-3 px-3">CORREO</th>
                            <th class="py-3 px-3">FECHA INGRESO</th>
                            <th class="py-3 px-3 text-center">ACCIONES</th>
                        </tr>
                    </thead>
                    <tbody id="empBody"></tbody>
                </table>
            </div>
            <div class="px-3 py-2 bg-light border-top">
                <small class="text-muted" id="footerInfo">Cargando…</small>
            </div>
        </div>
    </div>

    <!-- VISTA BAJAS -->
    <div id="vistaBajas" class="d-none">
        <div class="card border-0 shadow-sm" style="border-radius:12px; overflow:hidden;">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead style="background:#1a3c5e;">
                        <tr class="text-white" style="font-size:11.5px; font-weight:600; letter-spacing:.3px;">
                            <th class="py-3 px-3">#</th>
                            <th class="py-3 px-3">N° EMP</th>
                            <th class="py-3 px-3">NOMBRE COMPLETO</th>
                            <th class="py-3 px-3">TELÉFONO</th>
                            <th class="py-3 px-3">CORREO</th>
                            <th class="py-3 px-3 text-center">ESTADO</th>
                        </tr>
                    </thead>
                    <tbody id="bajasBody"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- ── MODAL DESACTIVAR ── -->
<div class="modal fade" id="modalBaja" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius:14px; overflow:hidden;">
            <div class="modal-header text-white fw-bold py-3 px-4" style="background:#b2382d;">
                <h5 class="modal-title">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>Dar de baja – Empleado
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="d-flex align-items-center gap-3 p-3 rounded-3"
                    style="background:#fbe9e7; border:1px solid rgba(178,56,45,.25);">
                    <i class="fa-solid fa-user fa-2x" style="color:#b2382d; flex-shrink:0;"></i>
                    <div>
                        <div class="fw-bold" id="bajaNombre">—</div>
                        <div class="small text-muted" id="bajaNumeroEmp">—</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer bg-light border-top">
                <button class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">
                    <i class="fa-solid fa-xmark me-1"></i>Cancelar
                </button>
                <button class="btn btn-danger rounded-pill px-4" onclick="confirmarBaja()">
                    <i class="fa-solid fa-user-slash me-1"></i>Confirmar baja
                </button>
            </div>
        </div>
    </div>
</div>
