<!-- ============================================
     VISTA: tipo_contrato.html
     Descripción: Gestión de tipos de contrato (catálogo)
     Compatible con: tipo_contrato.js
     ============================================ -->

<!-- ── CABECERA ── -->
<div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">
    <div>
        <h4 class="fw-bold mb-1 fs-2" style="color:#1a3c5e;">
            <i class="fa-solid fa-file-contract me-2 fs-2"></i>Tipos de contrato
        </h4>
        <p class="text-muted mb-0 fs-5">Catálogo de tipos de contrato laboral</p>
    </div>
    <button class="btn text-white fw-semibold" style="background:#1a3c5e;" onclick="mostrarFormulario()">
        <i class="fa-solid fa-plus me-1"></i>Nuevo tipo de contrato
    </button>
</div>

<!-- ── FORMULARIO ── -->
<div class="d-none mb-4" id="contenedorFormulario">
    <div class="card border-0 shadow-sm" style="border-radius:12px;overflow:hidden;">

        <div class="card-header fw-semibold text-white py-3 px-4" style="background:#1a3c5e;">
            <i class="fa-solid fa-file-contract me-2"></i>
            <span id="tituloFormulario">Nuevo tipo de contrato</span>
        </div>

        <div class="card-body p-4">
            <input type="hidden" id="pk_tipo_contrato">

            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-semibold" style="font-size:12px;color:#1a3c5e;">
                        Nombre <span class="text-danger">*</span>
                    </label>
                    <input type="text" id="nombre" class="form-control"
                        placeholder="Ej: Base, Confianza…">
                </div>
            </div>

            <hr class="my-4">

            <div class="d-flex justify-content-end gap-2">
                <button type="button" class="btn btn-secondary px-4" onclick="mostrarTabla()">
                    <i class="fa-solid fa-xmark me-1"></i>Cancelar
                </button>
                <button type="button" class="btn btn-success px-4" onclick="guardar()">
                    <i class="fa-solid fa-floppy-disk me-1"></i>Guardar
                </button>
            </div>
        </div>
    </div>
</div>

<!-- ── CONTENEDOR TABLA ── -->
<div id="contenedorTabla">

    <div class="d-flex gap-2 mb-3 flex-wrap">
        <div class="flex-grow-1 position-relative" style="min-width:200px;">
            <i class="fa-solid fa-magnifying-glass text-muted"
                style="position:absolute;left:10px;top:50%;transform:translateY(-50%);
                       font-size:12px;pointer-events:none;"></i>
            <input type="text" class="form-control ps-4" id="searchInput"
                placeholder="Buscar por nombre…" oninput="filtrarTabla()">
        </div>
    </div>

    <div class="card border-0 shadow-sm" style="border-radius:12px;overflow:hidden;">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0 table-bordered">
                <thead class="text-white text-center" style="background-color:#1a3c5e;">
                    <tr style="font-size:12px;font-weight:600;">
                        <th class="py-3 px-3" style="width:50px;">#</th>
                        <th class="py-3 px-3">NOMBRE</th>
                        <th class="py-3 px-3 text-center" style="width:120px;">ACCIONES</th>
                    </tr>
                </thead>
                <tbody id="tcBody" class="bg-white"></tbody>
            </table>
        </div>

        <!-- Footer: info + paginación -->
        <div class="px-3 pt-3 pb-3 bg-light border-top">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2 mt-1">
                <div id="footerInfo" class="small text-muted"></div>
                <div class="d-flex align-items-center gap-2">
                    <button id="btn-primero-tc" class="btn btn-sm text-white" style="background:#1a3c5e;">«</button>
                    <button id="btn-anterior-tc" class="btn btn-sm text-white" style="background:#1a3c5e;">Anterior</button>
                    <span id="pagina-info-tc" class="small text-muted">Página 1 de 1</span>
                    <input type="number" id="pagina-input-tc"
                        class="form-control form-control-sm text-center"
                        style="width:60px;" min="1" value="1">
                    <button id="btn-siguiente-tc" class="btn btn-sm text-white" style="background:#1a3c5e;">Siguiente</button>
                    <button id="btn-ultimo-tc" class="btn btn-sm text-white" style="background:#1a3c5e;">»</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- ── MODAL ELIMINAR ── -->
<div class="modal fade" id="modalEliminar" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg" style="border-radius:14px;overflow:hidden;">
            <div class="modal-header text-white fw-bold py-3 px-4" style="background:#b2382d;">
                <h5 class="modal-title">
                    <i class="fa-solid fa-triangle-exclamation me-2"></i>Eliminar tipo de contrato
                </h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-4">
                <div class="d-flex align-items-center gap-3 p-3 rounded-3"
                     style="background:#fbe9e7;border:1px solid rgba(178,56,45,.25);">
                    <i class="fa-solid fa-file-contract fa-2x" style="color:#b2382d;flex-shrink:0;"></i>
                    <div>
                        <div class="fw-bold" id="eliminarNombre">—</div>
                        <div class="small text-muted">¿Confirmas que deseas eliminar este tipo de contrato?</div>
                    </div>
                </div>
            </div>
            <div class="modal-footer bg-light border-top">
                <button class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">
                    <i class="fa-solid fa-xmark me-1"></i>Cancelar
                </button>
                <button class="btn btn-danger rounded-pill px-4" onclick="confirmarEliminar()">
                    <i class="fa-solid fa-trash me-1"></i>Eliminar
                </button>
            </div>
        </div>
    </div>
</div>
