<!-- ============================================
     VISTA: pedidos.html
     Descripción: Interfaz para gestionar pedidos con relación a clientes
     ============================================ -->

<div class="alert alert-success mt-4 container text-center">
    <h2>Gestión de Pedidos mal hechos</h2>
</div>

<!-- Botones de acción -->
<div class="container mb-3 text-end">
    <button class="btn btn-success" onclick="mostrarFormulario()">Crear Pedido</button>
    <button class="btn btn-secondary d-none" id="btnCancelar" onclick="mostrarTabla()">Cancelar</button>
</div>

<!-- FORMULARIO para crear/editar pedidos -->
<div class="container d-none" id="contenedorFormulario">
    <form id="formPedido">
        <!-- Campo oculto para el ID al editar -->
        <input type="hidden" id="pk_pedido">

        <div class="mb-3">
            <label class="form-label">Número de Pedido</label>
            <input type="text" id="numero_pedido" class="form-control" placeholder="Ej: PED-2025-001" required>
        </div>

        <!-- SELECT para elegir el cliente (llave foránea) -->
        <div class="mb-3">
            <label class="form-label">Cliente</label>
            <select id="fk_cliente" class="form-select" required>
                <option value="">-- Seleccione un cliente --</option>
                <!-- Las opciones se llenarán dinámicamente con JavaScript -->
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Total</label>
            <input type="number" id="total" class="form-control" step="0.01" placeholder="0.00" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Estado del Pedido</label>
            <select id="estado_pedido" class="form-select" required>
                <option value="pendiente">Pendiente</option>
                <option value="procesando">Procesando</option>
                <option value="enviado">Enviado</option>
                <option value="entregado">Entregado</option>
                <option value="cancelado">Cancelado</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Observaciones</label>
            <textarea id="observaciones" class="form-control" rows="3"></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">Guardar Pedido</button>
    </form>
</div>

<!-- TABLA para listar pedidos -->
<div class="container mt-4" id="contenedorTabla">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Número Pedido</th>
                <th>Cliente</th>
                <th>Email Cliente</th>
                <th>Total</th>
                <th>Estado</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaPedidos"></tbody>
    </table>
    <!-- Contenedor para la paginación -->
    <div id="footer-paginacion"></div>
</div>
