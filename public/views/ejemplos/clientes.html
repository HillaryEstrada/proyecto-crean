<!-- ============================================
     VISTA: clientes.html
     Descripción: Interfaz para gestionar clientes
     ============================================ -->

<div class="alert alert-primary mt-4 container text-center">
    <h2>Gestión de Clientes</h2>
</div>

<!-- Botones de acción -->
<div class="container mb-3 text-end">
    <button class="btn btn-success" onclick="mostrarFormulario()">Crear Cliente</button>
    <button class="btn btn-secondary d-none" id="btnCancelar" onclick="mostrarTabla()">Cancelar</button>
</div>

<!-- FORMULARIO para crear/editar clientes -->
<div class="container d-none" id="contenedorFormulario">
    <form id="formCliente">
        <!-- Campo oculto para el ID al editar -->
        <input type="hidden" id="pk_cliente">

        <div class="mb-3">
            <label class="form-label">Nombre Completo</label>
            <input type="text" id="nombre" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" id="telefono" class="form-control" placeholder="Ej: 3111234567">
        </div>

        <div class="mb-3">
            <label class="form-label">Dirección</label>
            <textarea id="direccion" class="form-control" rows="2"></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">Guardar Cliente</button>
    </form>
</div>

<!-- TABLA para listar clientes -->
<div class="container mt-4" id="contenedorTabla">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tablaClientes"></tbody>
    </table>
    <!-- Contenedor para la paginación -->
    <div id="footer-paginacion"></div>
</div>
