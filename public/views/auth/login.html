<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CREAN · Iniciar Sesión</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/css/login.css" />
  </head>

  <body>

    <!-- Notificaciones flotantes — fuera del layout, flotan sobre todo -->
    <div id="notifArea" class="notif-area"></div>

    <div class="login-page">

      <!-- ═══════════ PANEL IZQUIERDO ═══════════ -->
      <div class="panel-left">
        <div class="panel-left__content">

          <h1 class="panel-left__title">
            Centro de Rendimiento<br>
            Excelencia Agrícola<br>
            de Nayarit
          </h1>

          <div class="panel-left__contact">
            <span class="contact-item"><i class="bi bi-telephone"></i> +52 311 000 0000</span>
            <span class="contact-item"><i class="bi bi-envelope"></i> contacto@crean.gob.mx</span>
            <span class="contact-item"><i class="bi bi-globe"></i> crean.nayarit.gob.mx</span>
            <span class="contact-item"><i class="bi bi-geo-alt"></i> Tepic, Nayarit</span>
          </div>

        </div>
      </div>

      <!-- ═══════════ PANEL DERECHO ═══════════ -->
      <div class="panel-right">
        <div class="form-wrap">

          <h2>Iniciar Sesión</h2>
          <p class="form-subtitle">Accede con tus credenciales institucionales para continuar.</p>

          <form id="formLogin" novalidate>

            <!-- Usuario -->
            <div class="field-group">
              <label for="credencial" class="field-label">Usuario</label>
              <div class="input-wrap">
                <i class="bi bi-person input-icon"></i>
                <input
                  id="credencial"
                  type="text"
                  required
                  autocomplete="username"
                  placeholder="Ej: usuario@crean.gob.mx"
                  class="field-input"
                />
              </div>
            </div>

            <!-- Contraseña -->
            <div class="field-group">
              <label for="password" class="field-label">Contraseña</label>
              <div class="input-wrap">
                <i class="bi bi-lock input-icon"></i>
                <input
                  id="password"
                  type="password"
                  required
                  autocomplete="current-password"
                  placeholder="••••••••"
                  class="field-input"
                />
                <button type="button" class="toggle-pw" id="togglePw" aria-label="Mostrar contraseña">
                  <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
              </div>
            </div>

            <!-- Recordar sesión: oculto visualmente, login.js lo necesita -->
            <input type="checkbox" id="recordar" style="display:none;" />

            <!-- Olvidé mi contraseña -->
            <div class="forgot-row">
              <a href="#" class="forgot-link" id="btnOlvide">¿Olvidaste tu contraseña?</a>
            </div>

            <!-- Botón submit -->
            <button type="submit" class="btn-enter" id="btnLogin">
              <i class="bi bi-box-arrow-in-right"></i>
              <span id="btnTexto">Entrar</span>
              <span id="btnSpinner" class="spinner-border spinner-border-sm d-none" role="status">
                <span class="visually-hidden">Cargando...</span>
              </span>
            </button>

            <!-- #mensaje oculto: login.js lo usa internamente; las notifs lo interceptan -->
            <div id="mensaje" class="alert d-none" role="alert" style="display:none!important;position:absolute;pointer-events:none;opacity:0;"></div>

          </form>

          <p class="form-footer">© 2026 CREAN · Todos los derechos reservados</p>

        </div>
      </div>

    </div>

    <script src="/js/modules/auth/login.js" defer></script>

    <script>
      // Muestra notificación flotante (top-right), se cierra sola en 4s
      function showNotif(msg, type) {
        var area = document.getElementById('notifArea');

        var div = document.createElement('div');
        div.className = 'notif-box notif-' + type;
        div.innerHTML =
          '<span class="notif-msg">' +
            '<i class="bi ' + (type === 'error' ? 'bi-x-circle-fill' : 'bi-shield-lock-fill') + ' notif-icon"></i>' +
            msg +
          '</span>' +
          '<button type="button" class="notif-close" aria-label="Cerrar">' +
            '<i class="bi bi-x-lg"></i>' +
          '</button>';

        div.querySelector('.notif-close').addEventListener('click', function () {
          hideNotif(div);
        });

        area.appendChild(div);

        // Auto-cierre en 4 segundos
        setTimeout(function () {
          if (div.parentNode) hideNotif(div);
        }, 4000);
      }

      function hideNotif(div) {
        div.style.opacity = '0';
        div.style.transform = 'translateY(-8px)';
        setTimeout(function () {
          if (div.parentNode) div.remove();
        }, 280);
      }

      // Toggle contraseña
      document.getElementById('togglePw').addEventListener('click', function () {
        var pw  = document.getElementById('password');
        var ico = document.getElementById('eyeIcon');
        if (pw.type === 'password') {
          pw.type = 'text';
          ico.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
          pw.type = 'password';
          ico.classList.replace('bi-eye-slash', 'bi-eye');
        }
      });

      // Olvidé contraseña → notif de administrador
      document.getElementById('btnOlvide').addEventListener('click', function (e) {
        e.preventDefault();
        showNotif('Contacte con un administrador del sistema.', 'info');
      });

      // MutationObserver: intercepta cambios en #mensaje y dispara notif
      var msgEl = document.getElementById('mensaje');
      var observer = new MutationObserver(function () {
        var txt = msgEl.textContent.trim();
        if (!txt) return;

        // Solo disparar en caso de ERROR — el éxito lo maneja login.js con redirección
        if (msgEl.classList.contains('alert-danger')) {
          showNotif(txt, 'error');
          // Limpiar campos al equivocarse
          document.getElementById('credencial').value = '';
          document.getElementById('password').value = '';
          document.getElementById('password').type = 'password';
          var ico = document.getElementById('eyeIcon');
          if (ico) { ico.classList.remove('bi-eye-slash'); ico.classList.add('bi-eye'); }
        }

        // Limpiar para que el siguiente intento vuelva a disparar
        setTimeout(function () {
          msgEl.classList.add('d-none');
          msgEl.classList.remove('alert-danger', 'alert-success');
          msgEl.textContent = '';
        }, 200);
      });
      observer.observe(msgEl, { attributes: true, childList: true, subtree: true, characterData: true });
    </script>

  </body>
</html>
