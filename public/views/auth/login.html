<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Barberia</title>
    <script src="https://cdn.tailwindcss.com"></script>


    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      .input-group-text {
        cursor: pointer;
      }
    </style>
  </head>
  <body class="bg-[#1c1c24] min-h-screen flex items-center justify-center p-4">
    <div
      class="w-full max-w-[1200px] bg-[#13131a] rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row"
    >
      <!-- Left Section -->
      <div class="w-full md:w-1/2 relative">
        <a
          href="#"
          class="absolute top-6 left-6 text-white text-2xl font-bold z-10"
          >SistemaBarberia</a
        >
        <a
          href="https://business.google.com/v/karlitas-barberia/0326790342750954794/7bed/_?caid=21130697266&agid=158301383497&gclid=CjwKCAiAwNDMBhBfEiwAd7ti1GAzFl1qh7ICVx8AK5BA7uFbk0pZZDApPIVu_HSW_X2HbGtUeiouXRoC9FgQAvD_BwE&gad_source=1&gad_campaignid=21130697266"
          class="absolute top-6 right-6 bg-white/10 backdrop-blur-sm text-white px-4 py-2 rounded-full text-sm hover:bg-white/20 transition-colors z-10"
          >Web Page →</a
        >
        <div class="relative h-full">
          <img
            id="imagen-fondo"
            src="https://i.pinimg.com/1200x/29/96/3e/29963ee2b2298eefcba5308cddc57bdc.jpg"
          />
          <div class="absolute inset-0 bg-blue-900/30"></div>
          <div class="absolute bottom-12 left-12 text-white"></div>
        </div>
      </div>


      <!-- Right Section (Login Form) -->
      <div class="w-full md:w-1/2 p-6 md:p-12">
        <div class="max-w-md mx-auto">
          <div class="flex justify-center">
            <h1 class="mb-5 text-white text-2xl md:text-4xl font-semibold mb-2">
              Log in
            </h1>
          </div>
          <form id="formLogin">
            <!-- Usuario/Email -->
            <div class="mb-3">
              <label for="credencial" class="form-label text-white"
                >Usuario o Email</label
              >
              <input
                id="credencial"
                type="text"
                required
                autocomplete="username"
                placeholder="Ingresa tu usuario o email"
                class="mb-5 w-full bg-[#1c1c24] text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-600"
              />
            </div>


            <!-- Contraseña -->
            
            <div class="mb-4">
              <label for="password" class="form-label text-white"
                >Contraseña</label
              >
              <div class="input-group mb-3">
                <input
                  id="password"
                  type="password"
                  required
                  autocomplete="current-password"
                  placeholder="Ingresa tu contraseña"
                  class="mb-2 w-full bg-[#1c1c24] text-white rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-blue-600"
                />
              </div>
            </div>


            <!-- Recordar sesión -->
            <div class="mb-3 form-check">
              <input type="checkbox" class="form-check-input" id="recordar" />
              <label class="form-check-label text-white" for="recordar"
                >Recordar mi sesión</label
              >
            </div>


            <!-- Botón de login -->
            <button
              type="submit"
              class="mb-4 btn btn-dark w-100 rounded p-3 btn-login"
              id="btnLogin"
            >
              <span id="btnTexto">Iniciar Sesión</span>
              <span
                id="btnSpinner"
                class="spinner-border spinner-border-sm d-none"
                role="status"
              >
                <span class="visually-hidden">Cargando...</span>
              </span>
            </button>


            <!-- Mensaje de alerta -->
            <div id="mensaje" class="alert d-none mt-3" role="alert"></div>
          </form>
        </div>
      </div>
    </div>


    <!-- Tu script real de login -->
    <script src="/js/modules/auth/login.js" defer></script>
  </body>
</html>
