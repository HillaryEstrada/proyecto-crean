

<!-- ── CABECERA ─────────────────────────────────────────────── -->
<div class="d-flex align-items-start justify-content-between mb-4 flex-wrap gap-3">

  <div>
    <h4 class="maq-page-title">
      <i class="bi bi-truck me-2"></i>Maquinaria
    </h4>
    <p class="maq-page-sub">Gestión de equipos agrícolas e industriales</p>
  </div>

  <div class="d-flex gap-2 flex-wrap">
    <button onclick="exportarExcel()" class="btn-maq-excel">
      <i class="bi bi-file-earmark-arrow-down"></i> Exportar
    </button>
    <button onclick="abrirImportar()" class="btn-maq-secondary">
      <i class="bi bi-file-earmark-arrow-up"></i> Importar
    </button>
    <button onclick="mostrarFormulario()" class="btn-maq-primary">
      <i class="bi bi-plus-lg"></i> Registrar maquinaria
    </button>
  </div>

</div>

<!-- ── FORMULARIO (oculto por defecto) ──────────────────────── -->
<div class="d-none mb-4" id="contenedorFormulario">
  <div class="maq-table-wrap">

    <!-- Header del card -->
    <div class="maq-modal-hdr" style="border-radius:var(--maq-r-lg) var(--maq-r-lg) 0 0;">
      <div class="d-flex align-items-center justify-content-between">
        <h5 class="m-0">
          <i class="bi bi-truck me-2"></i>
          <span id="tituloFormulario">Registrar Maquinaria</span>
        </h5>
        <button type="button" class="btn-maq-secondary" style="padding:5px 12px;" onclick="mostrarTabla()">
          <i class="bi bi-x-lg"></i>
        </button>
      </div>
    </div>

    <!-- Body del formulario -->
    <div class="p-4">
      <form id="formMaquinaria">
        <input type="hidden" id="pk_maquinaria">

        <div class="row g-3">

          <div class="col-md-6">
            <label class="maq-label">
              Número Económico <span class="text-danger">*</span>
            </label>
            <input type="text" id="numero_economico" class="form-control form-control-sm"
              placeholder="Ej: MAQ-001" required autocomplete="off">
          </div>

          <div class="col-md-6">
            <label class="maq-label">
              Tipo de Equipo <span class="text-danger">*</span>
            </label>
            <input type="text" id="tipo_equipo" class="form-control form-control-sm"
              placeholder="Ej: Tractor" required autocomplete="off">
          </div>

          <div class="col-md-4">
            <label class="maq-label">Marca</label>
            <input type="text" id="marca" class="form-control form-control-sm"
              placeholder="Ej: John Deere" autocomplete="off">
          </div>

          <div class="col-md-4">
            <label class="maq-label">Modelo</label>
            <input type="text" id="modelo" class="form-control form-control-sm"
              placeholder="Ej: 5075E" autocomplete="off">
          </div>

          <div class="col-md-4">
            <label class="maq-label">Año</label>
            <input type="number" id="anio" class="form-control form-control-sm"
              placeholder="2024" min="1980" max="2030">
          </div>

          <div class="col-12">
            <label class="maq-label">
              Ubicación <span class="text-danger">*</span>
            </label>
            <input type="text" id="ubicacion" class="form-control form-control-sm"
              placeholder="Ej: Campo Norte" required autocomplete="off">
          </div>

        </div>

        <hr class="my-4" style="border-color:var(--maq-border);">

        <div class="d-flex justify-content-end gap-2">
          <button type="button" class="btn-maq-secondary" onclick="mostrarTabla()">
            <i class="bi bi-x-lg"></i> Cancelar
          </button>
          <button type="submit" class="btn-maq-success">
            <i class="bi bi-floppy2"></i> Guardar
          </button>
        </div>

      </form>
    </div>

  </div>
</div>

<!-- ── CONTENEDOR TABLA ──────────────────────────────────────── -->
<div id="contenedorTabla">

  <!-- Tabs: Activos / Bajas -->
  <div class="maq-tabs">
    <button class="maq-tab active" id="tabActivos" onclick="switchTab('activos')">
      <i class="bi bi-check-circle-fill"></i> Activos
      <span class="maq-tab-badge" id="badgeActivos">0</span>
    </button>
    <button class="maq-tab" id="tabBajas" onclick="switchTab('bajas')">
      <i class="bi bi-x-circle-fill"></i> Bajas
      <span class="maq-tab-badge" id="badgeBajas">0</span>
    </button>
  </div>

  <!-- ── VISTA ACTIVOS ─────────────────────────────────────── -->
  <div id="vistaActivos">

    <!-- Filtros -->
    <div class="d-flex gap-2 mb-3 flex-wrap">
      <div class="maq-filtro-wrap">
        <i class="bi bi-search"></i>
        <input type="text" class="form-control" style="height:38px;"
          placeholder="Buscar por número, tipo, marca…"
          id="searchInput" oninput="filtrarTabla()">
      </div>
      <select class="form-select" id="filtroEstado"
        style="width:auto; height:38px;" onchange="filtrarTabla()">
        <option value="">Todos los estados</option>
        <option value="disponible">Disponible</option>
        <option value="en_uso">En uso</option>
        <option value="mantenimiento">Mantenimiento</option>
        <option value="revision">Revisión</option>
      </select>
    </div>

    <!-- Tabla activos -->
    <div class="maq-table-wrap">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>N° ECO</th>
              <th>TIPO DE EQUIPO</th>
              <th>MARCA / MODELO</th>
              <th class="text-center">AÑO</th>
              <th>UBICACIÓN</th>
              <th class="text-center">ESTADO OP.</th>
              <th class="text-center">ACCIONES</th>
            </tr>
          </thead>
          <tbody id="maqBody"></tbody>
        </table>
      </div>
      <div class="maq-table-footer">
        <span id="footerInfo">Cargando…</span>
      </div>
    </div>

  </div><!-- /vistaActivos -->

  <!-- ── VISTA BAJAS ───────────────────────────────────────── -->
  <div id="vistaBajas" class="d-none">
    <div class="maq-table-wrap">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead>
            <tr>
              <th>#</th>
              <th>N° ECO</th>
              <th>TIPO DE EQUIPO</th>
              <th>MARCA / MODELO</th>
              <th>UBICACIÓN</th>
              <th class="text-center">ESTADO</th>
            </tr>
          </thead>
          <tbody id="bajasBody"></tbody>
        </table>
      </div>
      <div class="maq-table-footer">
        <span style="color:var(--maq-muted);">Registros de baja</span>
      </div>
    </div>
  </div><!-- /vistaBajas -->

</div><!-- /contenedorTabla -->


<!-- ══ MODAL: DAR DE BAJA ══════════════════════════════════════
     Abierto por abrirBaja() — confirmación llama a confirmarBajaModal()
════════════════════════════════════════════════════════════════ -->
<div class="modal fade" id="modalBaja" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-dialog-centered" style="max-width:500px;">
    <div class="modal-content border-0"
      style="border-radius:var(--maq-r-lg); box-shadow:0 20px 60px rgba(0,0,0,.18);">

      <!-- Header peligro -->
      <div class="maq-modal-hdr-danger">
        <div class="d-flex align-items-center justify-content-between">
          <h5 class="m-0">
            <i class="bi bi-exclamation-triangle me-2"></i>Dar de Baja – Maquinaria
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
      </div>

      <!-- Body -->
      <div class="modal-body p-4">

        <!-- Resumen del equipo -->
        <div class="maq-baja-box">
          <i class="bi bi-truck" style="font-size:2rem; color:var(--maq-danger); flex-shrink:0;"></i>
          <div>
            <div class="fw-semibold" id="bajaNumero">—</div>
            <div class="small" style="color:var(--maq-muted);" id="bajaEquipoDesc">—</div>
          </div>
        </div>

        <!-- Tipo de baja -->
        <div class="mb-3">
          <label class="maq-label">Tipo de Baja <span class="text-danger">*</span></label>
          <select class="form-select form-select-sm" id="bajaTipoInput">
            <option value="">Seleccionar…</option>
            <option value="venta">Venta</option>
            <option value="donacion">Donación</option>
            <option value="transferencia">Transferencia</option>
            <option value="baja_tecnica">Baja Técnica</option>
            <option value="perdida">Pérdida</option>
          </select>
          <div class="maq-field-error d-none" id="err_baja_tipo">Campo requerido</div>
        </div>

        <!-- Motivo -->
        <div>
          <label class="maq-label">Motivo <span class="text-danger">*</span></label>
          <textarea class="form-control form-control-sm" id="bajaMotivoInput" rows="3"
            placeholder="Describe la razón de la baja…"></textarea>
          <div class="maq-field-error d-none" id="err_baja_motivo">Campo requerido</div>
        </div>

      </div>

      <!-- Footer -->
      <div class="maq-modal-footer" style="border-radius:0 0 var(--maq-r-lg) var(--maq-r-lg);">
        <button class="btn-maq-secondary" data-bs-dismiss="modal">
          <i class="bi bi-x-lg"></i> Cancelar
        </button>
        <button class="btn-maq-danger" onclick="confirmarBajaModal()">
          <i class="bi bi-slash-circle-fill"></i> Confirmar Baja
        </button>
      </div>

    </div>
  </div>
</div>
